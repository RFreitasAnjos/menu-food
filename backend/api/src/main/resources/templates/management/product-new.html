<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{management/layout :: head('Novo Produto')}"></th:block>
</head>
<body>

<th:block th:replace="~{management/layout :: sidebar('products')}"></th:block>

<div class="main-wrapper">
    <th:block th:replace="~{management/layout :: topbar('Novo Produto')}"></th:block>

    <main class="main-content">
        <th:block th:replace="~{management/layout :: alerts}"></th:block>

        <div class="mb-3">
            <a href="/management/products" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Voltar para Produtos
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-7 col-xl-6">
                <div class="card stat-card">
                    <div class="card-header bg-white border-0 pt-3 pb-1">
                        <h6 class="fw-semibold mb-0">
                            <i class="bi bi-plus-circle me-2 text-primary"></i>Criar Novo Produto
                        </h6>
                    </div>
                    <div class="card-body">
                        <form action="/management/products/new" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Nome do Produto <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="name" class="form-control" required maxlength="50"
                                       placeholder="Ex: X-Burguer Especial">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Descrição</label>
                                <textarea name="description" class="form-control" rows="3" maxlength="255"
                                          placeholder="Breve descrição do produto"></textarea>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label fw-semibold">
                                        Preço (R$) <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" name="price" class="form-control"
                                           step="0.01" min="0" required placeholder="0,00">
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label fw-semibold">Categoria</label>
                                    <select name="category" class="form-select">
                                        <option value="">Selecione...</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.name()}"
                                                th:text="${cat.name() == 'FOOD' ? 'Comida' :
                                                           cat.name() == 'DRINK' ? 'Bebida' : 'Sobremesa'}">-</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Imagem do Produto</label>
                                <input type="hidden" name="imageUrl" id="imageUrlField">

                                <div id="imageUploadArea"
                                     class="border rounded-3 position-relative overflow-hidden"
                                     style="height:180px; cursor:pointer; border-style:dashed !important;">
                                    <img id="imgPreview" src="" alt="Preview"
                                         class="d-none w-100 h-100" style="object-fit:cover;">
                                    <div id="uploadPlaceholder"
                                         class="d-flex flex-column align-items-center justify-content-center h-100 text-muted">
                                        <i class="bi bi-camera fs-1"></i>
                                        <small class="mt-1">Clique para selecionar imagem</small>
                                    </div>
                                    <div id="uploadOverlay"
                                         class="d-none position-absolute top-0 start-0 w-100 h-100
                                                d-flex align-items-center justify-content-center"
                                         style="background:rgba(0,0,0,.5);">
                                        <div class="spinner-border text-white" role="status"></div>
                                    </div>
                                </div>
                                <input type="file" id="fileInput" accept="image/*" class="d-none">
                                <div id="uploadError" class="text-danger small mt-1"></div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-1"></i>Criar Produto
                                </button>
                                <a href="/management/products" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const area     = document.getElementById('imageUploadArea');
        const fileIn   = document.getElementById('fileInput');
        const preview  = document.getElementById('imgPreview');
        const holder   = document.getElementById('uploadPlaceholder');
        const overlay  = document.getElementById('uploadOverlay');
        const errDiv   = document.getElementById('uploadError');
        const urlField = document.getElementById('imageUrlField');

        area.addEventListener('click', () => fileIn.click());

        fileIn.addEventListener('change', async function () {
            const file = this.files[0];
            if (!file) return;

            overlay.classList.remove('d-none');
            overlay.classList.add('d-flex');
            errDiv.textContent = '';

            const fd = new FormData();
            fd.append('file', file);

            try {
                const res  = await fetch('/management/api/upload-image', { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Upload falhou');

                urlField.value = data.url;
                preview.src    = data.url;
                preview.classList.remove('d-none');
                holder.classList.add('d-none');
            } catch (err) {
                errDiv.textContent = err.message;
            } finally {
                overlay.classList.remove('d-flex');
                overlay.classList.add('d-none');
            }
        });
    })();
</script>
</body>
</html>
