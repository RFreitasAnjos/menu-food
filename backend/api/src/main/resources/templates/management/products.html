<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
   <th:block th:replace="~{management/layout :: head('Produtos')}"></th:block>
</head>

<body>
   <th:block th:replace="~{management/layout :: sidebar('products')}"></th:block>
   <div class="main-wrapper">
      <th:block th:replace="~{management/layout :: topbar('Produtos')}"></th:block>
      <main class="main-content">
         <th:block th:replace="~{management/layout :: alerts}"></th:block>

         <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-semibold mb-0">Lista de Produtos</h6>
            <a href="/management/products/new" class="btn btn-sm btn-primary">
               <i class="bi bi-plus-circle me-1"></i>Novo Produto
            </a>
         </div>

         <div class="card stat-card">
            <div class="card-body p-0">

               <!-- ── Barra de filtros ──────────────────────────────── -->
               <div class="px-3 pt-3 pb-2 border-bottom">
                  <form method="get" action="/management/products" class="row g-2 align-items-end">

                     <!-- Busca por nome -->
                     <div class="col-12 col-sm-5 col-lg-4">
                        <label class="form-label small fw-semibold mb-1 text-muted">Buscar produto</label>
                        <div class="input-group input-group-sm">
                           <span class="input-group-text bg-white border-end-0">
                              <i class="bi bi-search text-muted"></i>
                           </span>
                           <input type="text" name="search" class="form-control border-start-0 ps-0"
                              placeholder="Nome do produto..." th:value="${search}">
                        </div>
                     </div>

                     <!-- Categoria -->
                     <div class="col-6 col-sm-3 col-lg-2">
                        <label class="form-label small fw-semibold mb-1 text-muted">Categoria</label>
                        <select name="category" class="form-select form-select-sm">
                           <option value="">Todas</option>
                           <option value="FOOD"    th:selected="${selectedCategory != null and selectedCategory.name() == 'FOOD'}">Comida</option>
                           <option value="DRINK"   th:selected="${selectedCategory != null and selectedCategory.name() == 'DRINK'}">Bebida</option>
                           <option value="DESSERT" th:selected="${selectedCategory != null and selectedCategory.name() == 'DESSERT'}">Sobremesa</option>
                        </select>
                     </div>

                     <!-- Status -->
                     <div class="col-6 col-sm-3 col-lg-2">
                        <label class="form-label small fw-semibold mb-1 text-muted">Status</label>
                        <select name="active" class="form-select form-select-sm">
                           <option value=""      th:selected="${selectedActive == null}">Todos</option>
                           <option value="true"  th:selected="${selectedActive != null and selectedActive}">Ativos</option>
                           <option value="false" th:selected="${selectedActive != null and !selectedActive}">Inativos</option>
                        </select>
                     </div>

                     <!-- Botões -->
                     <div class="col-12 col-sm-auto col-lg-auto d-flex gap-2">
                        <button type="submit" class="btn btn-sm btn-primary">
                           <i class="bi bi-funnel me-1"></i>Filtrar
                        </button>
                        <a href="/management/products" class="btn btn-sm btn-outline-secondary">
                           <i class="bi bi-x-circle me-1"></i>Limpar
                        </a>
                     </div>

                  </form>

                  <!-- Resultado da busca ativa -->
                  <div th:if="${search != null or selectedCategory != null or selectedActive != null}"
                       class="mt-2 d-flex flex-wrap gap-2 align-items-center">
                     <small class="text-muted">Filtros ativos:</small>
                     <span th:if="${search != null and !#strings.isEmpty(search)}"
                           class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 fw-normal">
                        <i class="bi bi-search me-1"></i><span th:text="${search}"></span>
                     </span>
                     <span th:if="${selectedCategory != null}"
                           class="badge bg-warning bg-opacity-10 text-warning-emphasis border border-warning border-opacity-25 fw-normal"
                           th:text="${selectedCategory.name() == 'FOOD' ? 'Comida' : selectedCategory.name() == 'DRINK' ? 'Bebida' : 'Sobremesa'}">
                     </span>
                     <span th:if="${selectedActive != null}"
                           th:class="${selectedActive ? 'badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 fw-normal' : 'badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 fw-normal'}"
                           th:text="${selectedActive ? 'Ativos' : 'Inativos'}">
                     </span>
                     <small class="text-muted ms-1" th:text="'— ' + ${products.size()} + ' resultado(s)'"></small>
                  </div>
               </div>
               <!-- ────────────────────────────────────────────────── -->
               <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                     <thead>
                        <tr>
                           <th style="width:60px">Imagem</th>
                           <th>Nome</th>
                           <th>Categoria</th>
                           <th class="text-end">Preço</th>
                           <th class="text-center">Status</th>
                           <th class="text-center">Opções</th>
                           <th class="text-center">Ações</th>
                        </tr>
                     </thead>
                     <tbody>
                        <tr th:if="${products.empty}">
                           <td colspan="7" class="text-center text-muted py-4">Nenhum produto cadastrado.</td>
                        </tr>
                        <tr th:each="product : ${products}">
                           <td>
                              <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" alt="img" class="rounded"
                                 style="width:44px;height:44px;object-fit:cover;">
                              <div th:unless="${product.imageUrl}"
                                 class="rounded bg-light d-flex align-items-center justify-content-center"
                                 style="width:44px;height:44px;">
                                 <i class="bi bi-image text-muted"></i>
                              </div>
                           </td>
                           <td class="fw-semibold" th:text="${product.name}">-</td>
                           <td>
                              <span th:if="${product.category != null}" class="badge rounded-pill" th:classappend="${
                                          product.category.name() == 'FOOD'    ? 'bg-warning text-dark' :
                                          product.category.name() == 'DRINK'   ? 'bg-info text-dark' :
                                          'bg-secondary text-dark'}" th:text="${
                                          product.category.name() == 'FOOD'    ? 'Comida' :
                                          product.category.name() == 'DRINK'   ? 'Bebida' : 'Sobremesa'}">-</span>
                              <span th:unless="${product.category != null}" class="text-muted small">—</span>
                           </td>
                           <td class="text-end fw-semibold"
                              th:text="${'R$ ' + #numbers.formatDecimal(product.basePrice, 1, 'POINT', 2, 'COMMA')}">-
                           </td>
                           <td class="text-center">
                              <span th:if="${product.active}" class="badge bg-success">Ativo</span>
                              <span th:unless="${product.active}" class="badge bg-secondary">Inativo</span>
                           </td>
                           <td class="text-center">
                              <span class="badge bg-light text-dark border"
                                 th:text="${product.optionGroups != null ? product.optionGroups.size() : 0} + ' grupo(s)'">0</span>
                           </td>
                           <td class="text-center">
                              <a th:href="@{/management/products/{id}/edit(id=${product.id})}"
                                 class="btn btn-sm btn-outline-primary">
                                 <i class="bi bi-pencil me-1"></i>Editar
                              </a>
                              <form th:action="@{/management/products/{id}/delete(id=${product.id})}" method="post" class="d-inline">
                                 <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                 <button type="submit" class="btn btn-sm btn-outline-danger"
                                         onclick="return confirm('Tem certeza que deseja excluir este produto? Esta ação não pode ser desfeita.')">
                                    <i class="bi bi-trash me-1"></i>Excluir
                                 </button>
                              </form>
                           </td>
                        </tr>
                     </tbody>
                  </table>
               </div>
            </div>
         </div>
      </main>
   </div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
