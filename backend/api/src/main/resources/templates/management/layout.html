<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- FRAGMENT: head -->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' — Gestão MenuFood'">Gestão MenuFood</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body { background-color: #f0f2f5; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            width: 240px;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        .sidebar .brand {
            color: #e94560;
            font-size: 1.35rem;
            font-weight: 700;
            padding: 1rem 1.25rem 1.5rem;
            display: block;
            text-decoration: none;
        }
        .sidebar .nav-link {
            color: #a8b2d8;
            padding: 0.6rem 1.25rem;
            border-radius: 0.375rem;
            margin: 0.1rem 0.6rem;
            font-size: 0.9rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: rgba(233, 69, 96, 0.18);
            color: #e94560;
        }
        .sidebar .nav-link i { width: 1.4rem; }
        .main-wrapper { margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }
        .topbar {
            background: #fff;
            border-bottom: 1px solid #dee2e6;
            padding: 0.7rem 1.75rem;
            position: sticky;
            top: 0;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .main-content { padding: 1.75rem; flex: 1; }
        .stat-card { border: none; border-radius: 0.75rem; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
        .badge-status { font-size: 0.75rem; }
        .table th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; background: #f8f9fa; }
    </style>
</th:block>

<!-- FRAGMENT: sidebar -->
<nav th:fragment="sidebar(activePage)" class="sidebar">
    <a class="brand" href="/management/dashboard">
        <i class="bi bi-egg-fried me-2"></i>MenuFood
    </a>
    <ul class="nav flex-column flex-grow-1">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active'"
               href="/management/dashboard">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'orders'} ? ' active'"
               href="/management/orders">
                <i class="bi bi-receipt me-2"></i>Pedidos
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'products'} ? ' active'"
               href="/management/products">
                <i class="bi bi-box-seam me-2"></i>Produtos
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'billing'} ? ' active'"
               href="/management/billing">
                <i class="bi bi-currency-dollar me-2"></i>Faturamento
            </a>
        </li>
    </ul>
    <div class="p-3">
        <form method="post" action="/management/logout">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                <i class="bi bi-box-arrow-left me-1"></i>Sair
            </button>
        </form>
    </div>
</nav>

<!-- FRAGMENT: topbar -->
<div th:fragment="topbar(pageTitle)" class="topbar">
    <h5 class="mb-0 fw-semibold" th:text="${pageTitle}">Painel</h5>
    <span class="text-muted small" sec:authentication="name">admin</span>
</div>

<!-- FRAGMENT: alerts -->
<th:block th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</th:block>

</html>
