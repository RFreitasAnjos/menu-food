<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Gestão MenuFood</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,.35);
        }
        .brand-title { color: #e94560; font-weight: 700; font-size: 1.8rem; }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="card-body">
        <div class="text-center mb-4">
            <i class="bi bi-egg-fried fs-1 text-danger"></i>
            <h1 class="brand-title mt-2">MenuFood</h1>
            <p class="text-muted small">Painel de Gestão</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            E-mail ou senha incorretos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle-fill me-1"></i>
            Sessão encerrada com sucesso.
        </div>

        <form method="post" action="/management/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" name="email"
                           class="form-control" placeholder="admin@menufood.com"
                           autocomplete="username" required autofocus />
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="••••••••"
                           autocomplete="current-password" required />
                </div>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
