<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{management/layout :: head('Detalhe do Pedido')}"></th:block>
</head>
<body>

<th:block th:replace="~{management/layout :: sidebar('orders')}"></th:block>

<div class="main-wrapper">
    <th:block th:replace="~{management/layout :: topbar('Detalhe do Pedido')}"></th:block>

    <main class="main-content">
        <th:block th:replace="~{management/layout :: alerts}"></th:block>

        <!-- Breadcrumb + ações -->
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="/management/orders">Pedidos</a></li>
                    <li class="breadcrumb-item active" th:text="${order.shortId}">Pedido</li>
                </ol>
            </nav>
            <a th:href="@{/management/orders/{id}/extract(id=${order.id})}"
               target="_blank"
               class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1">
                <i class="bi bi-printer"></i> Extrato / Imprimir
            </a>
        </div>

        <div class="row g-4">

            <!-- ── Coluna principal ────────────────── -->
            <div class="col-lg-8">

                <!-- Itens do pedido -->
                <div class="card stat-card mb-4">
                    <div class="card-header d-flex align-items-center gap-2 py-3">
                        <i class="bi bi-bag-check text-primary"></i>
                        <span class="fw-semibold">Itens do Pedido</span>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Produto</th>
                                    <th class="text-center">Qtd</th>
                                    <th class="text-end">Unit.</th>
                                    <th class="text-end">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${order.items}">
                                    <td th:text="${item.productName}">-</td>
                                    <td class="text-center" th:text="${item.quantity}">-</td>
                                    <td class="text-end"
                                        th:text="${'R$ ' + #numbers.formatDecimal(item.basePrice, 1, 'POINT', 2, 'COMMA')}">-</td>
                                    <td class="text-end fw-semibold"
                                        th:text="${'R$ ' + #numbers.formatDecimal(item.totalPrice, 1, 'POINT', 2, 'COMMA')}">-</td>
                                </tr>
                            </tbody>
                            <tfoot class="table-light">
                                <tr>
                                    <td colspan="3" class="text-end fw-bold">Total</td>
                                    <td class="text-end fw-bold text-primary"
                                        th:text="${'R$ ' + #numbers.formatDecimal(order.totalPrice, 1, 'POINT', 2, 'COMMA')}">-</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <!-- Endereço de entrega -->
                <div class="card stat-card" th:if="${order.address != null}">
                    <div class="card-header d-flex align-items-center gap-2 py-3">
                        <i class="bi bi-geo-alt text-primary"></i>
                        <span class="fw-semibold">Endereço de Entrega</span>
                    </div>
                    <div class="card-body">
                        <p class="mb-1" th:text="${order.address.street + ', ' + order.address.number}">-</p>
                        <p class="mb-1 text-muted small"
                            th:text="${order.address.neighborhood + ' — ' + order.address.city + '/' + order.address.state}">-</p>
                        <p class="mb-0 text-muted small" th:if="${order.address.zipCode != null}"
                            th:text="${'CEP: ' + order.address.zipCode}">-</p>
                    </div>
                </div>

            </div>

            <!-- ── Coluna lateral ─────────────────── -->
            <div class="col-lg-4">

                <!-- Dados do pedido -->
                <div class="card stat-card mb-4">
                    <div class="card-header d-flex align-items-center gap-2 py-3">
                        <i class="bi bi-receipt text-primary"></i>
                        <span class="fw-semibold">Resumo</span>
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0 small">
                            <dt class="col-5 text-muted">Nº Pedido</dt>
                            <dd class="col-7 fw-semibold font-monospace" th:text="${order.shortId}">-</dd>

                            <dt class="col-5 text-muted">Data</dt>
                            <dd class="col-7"
                                th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">-</dd>

                            <dt class="col-5 text-muted">Status</dt>
                            <dd class="col-7">
                                <span class="badge rounded-pill" th:classappend="${
                                    order.status.name() == 'DELIVERED'      ? 'bg-success' :
                                    order.status.name() == 'CANCELED'       ? 'bg-danger'  :
                                    order.status.name() == 'PAID'           ? 'bg-primary' :
                                    order.status.name() == 'IN_PREPARATION' ? 'bg-primary' :
                                    order.status.name() == 'SENT'           ? 'bg-info'    :
                                    'bg-secondary'}"
                                    th:text="${order.status.name().replace('_',' ')}">-</span>
                            </dd>

                            <dt class="col-5 text-muted">Total</dt>
                            <dd class="col-7 fw-bold text-primary"
                                th:text="${'R$ ' + #numbers.formatDecimal(order.totalPrice, 1, 'POINT', 2, 'COMMA')}">-</dd>
                        </dl>
                    </div>
                </div>

                <!-- Dados do cliente -->
                <div class="card stat-card mb-4">
                    <div class="card-header d-flex align-items-center gap-2 py-3">
                        <i class="bi bi-person text-primary"></i>
                        <span class="fw-semibold">Cliente</span>
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0 small">
                            <dt class="col-4 text-muted">Nome</dt>
                            <dd class="col-8 fw-semibold" th:text="${order.userName}">-</dd>

                            <dt class="col-4 text-muted">E-mail</dt>
                            <dd class="col-8 text-break" th:text="${order.userEmail}">-</dd>

                            <dt class="col-4 text-muted">Celular</dt>
                            <dd class="col-8" th:text="${order.userPhone}">-</dd>
                        </dl>
                    </div>
                </div>

                <!-- Alterar status -->
                <div class="card stat-card">
                    <div class="card-header d-flex align-items-center gap-2 py-3">
                        <i class="bi bi-arrow-repeat text-primary"></i>
                        <span class="fw-semibold">Alterar Status</span>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/management/orders/{id}/status(id=${order.id})}" method="post"
                              class="d-flex gap-2 align-items-center">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <select name="status" class="form-select form-select-sm">
                                <option th:each="s : ${statuses}" th:value="${s.name()}"
                                    th:text="${s.name().replace('_',' ')}"
                                    th:selected="${order.status.name() == s.name()}">STATUS</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary text-nowrap">
                                <i class="bi bi-check-lg me-1"></i>Salvar
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
