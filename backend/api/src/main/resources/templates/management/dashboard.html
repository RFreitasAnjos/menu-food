<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{management/layout :: head('Dashboard')}"></th:block>
</head>
<body>

<th:block th:replace="~{management/layout :: sidebar('dashboard')}"></th:block>

<div class="main-wrapper">
    <th:block th:replace="~{management/layout :: topbar('Dashboard')}"></th:block>

    <main class="main-content">
        <th:block th:replace="~{management/layout :: alerts}"></th:block>

        <!-- KPIs -->
        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-xl-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                            <i class="bi bi-receipt text-primary fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Total de Pedidos</div>
                            <div class="fs-3 fw-bold" th:text="${stats.totalOrders}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-success bg-opacity-10 p-3">
                            <i class="bi bi-currency-dollar text-success fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Faturamento Total</div>
                            <div class="fs-3 fw-bold"
                                 th:text="${'R$ ' + #numbers.formatDecimal(stats.totalRevenue, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                            <i class="bi bi-calendar-day text-warning fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Faturamento Hoje</div>
                            <div class="fs-3 fw-bold"
                                 th:text="${'R$ ' + #numbers.formatDecimal(stats.revenueToday, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-danger bg-opacity-10 p-3">
                            <i class="bi bi-hourglass-split text-danger fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Em Preparo</div>
                            <div class="fs-3 fw-bold"
                                 th:text="${stats.countByStatus['IN_PREPARATION']} ?: 0">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status breakdown -->
        <div class="row g-3 mb-4">
            <div class="col-12">
                <div class="card stat-card">
                    <div class="card-header bg-white border-0 pt-3 pb-1">
                        <h6 class="fw-semibold mb-0">Pedidos por Status</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-6 col-sm-4 col-md-3 col-xl-2"
                                 th:each="entry : ${stats.countByStatus}">
                                <div class="border rounded p-2 text-center">
                                    <div class="fw-bold fs-5" th:text="${entry.value}">0</div>
                                    <div class="small text-muted"
                                         th:text="${entry.key.name().replace('_',' ')}">STATUS</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent orders -->
        <div class="card stat-card">
            <div class="card-header bg-white border-0 pt-3 pb-1 d-flex justify-content-between align-items-center">
                <h6 class="fw-semibold mb-0">Pedidos Recentes</h6>
                <a href="/management/orders" class="btn btn-sm btn-outline-primary">Ver todos</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th class="text-end">Valor</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(recentOrders)}">
                            <td colspan="4" class="text-center text-muted py-4">Nenhum pedido encontrado.</td>
                        </tr>
                        <tr th:each="order : ${recentOrders}">
                            <td class="font-monospace small"
                                th:text="${#strings.substring(order.id.toString(), 0, 8) + '…'}">-</td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">-</td>
                            <td>
                                <span class="badge badge-status rounded-pill"
                                      th:classappend="${
                                        order.status.name() == 'DELIVERED'       ? 'bg-success' :
                                        order.status.name() == 'CANCELED'        ? 'bg-danger'  :
                                        order.status.name() == 'PAID'            ? 'bg-primary' :
                                        order.status.name() == 'IN_PREPARATION'  ? 'bg-primary' :
                                        order.status.name() == 'SENT'            ? 'bg-info'    :
                                        'bg-secondary'}"
                                      th:text="${order.status.name().replace('_',' ')}">-</span>
                            </td>
                            <td class="text-end fw-semibold"
                                th:text="${'R$ ' + #numbers.formatDecimal(order.totalPrice, 1, 'POINT', 2, 'COMMA')}">-</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
