<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <th:block th:replace="~{management/layout :: head('Pedidos')}"></th:block>
</head>

<body>

    <th:block th:replace="~{management/layout :: sidebar('orders')}"></th:block>

    <div class="main-wrapper">
        <th:block th:replace="~{management/layout :: topbar('Gerenciamento de Pedidos')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{management/layout :: alerts}"></th:block>

            <!-- Filter bar -->
            <div class="card stat-card mb-4">
                <div class="card-body py-2">
                    <form method="get" action="/management/orders" class="d-flex align-items-center gap-3 flex-wrap">
                        <label class="fw-semibold small mb-0">Filtrar por status:</label>
                        <select name="status" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
                            <option value="" th:selected="${selectedStatus == null}">Todos</option>
                            <option th:each="s : ${statuses}" th:value="${s.name()}"
                                th:text="${s.name().replace('_',' ')}"
                                th:selected="${selectedStatus != null and selectedStatus.name() == s.name()}">STATUS
                            </option>
                        </select>
                        <a href="/management/orders" class="btn btn-sm btn-outline-secondary">Limpar</a>
                    </form>
                </div>
            </div>

            <!-- Orders table -->
            <div class="card stat-card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Nº / Cliente</th>
                                    <th>Data</th>
                                    <th>Itens</th>
                                    <th>Status Atual</th>
                                    <th class="text-end">Valor</th>
                                    <th class="text-center">Alterar Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(orders)}">
                                    <td colspan="6" class="text-center text-muted py-5">
                                        <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                        Nenhum pedido encontrado.
                                    </td>
                                </tr>
                                <tr th:each="order : ${orders}">
                                    <td>
                                        <a th:href="@{/management/orders/{id}(id=${order.id})}"
                                           class="text-decoration-none fw-semibold font-monospace small d-block"
                                           th:text="${order.shortId}">-</a>
                                        <span class="text-muted d-block" style="font-size:0.72rem"
                                            th:text="${order.userName}">-</span>
                                        <span class="text-muted d-block" style="font-size:0.72rem"
                                            th:text="${order.userPhone}">-</span>
                                    </td>
                                    <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">-</td>
                                    <td>
                                        <span class="badge bg-secondary rounded-pill"
                                            th:text="${#lists.size(order.items)} + ' item(s)'">0 item(s)</span>
                                    </td>
                                    <td>
                                        <span class="badge badge-status rounded-pill" th:classappend="${
                                        order.status.name() == 'DELIVERED'       ? 'bg-success' :
                                        order.status.name() == 'CANCELED'        ? 'bg-danger'  :
                                        order.status.name() == 'PAID'            ? 'bg-primary' :
                                        order.status.name() == 'IN_PREPARATION'  ? 'bg-primary' :
                                        order.status.name() == 'SENT'            ? 'bg-info'    :
                                        'bg-secondary'}" th:text="${order.status.name().replace('_',' ')}">-</span>
                                    </td>
                                    <td class="text-end fw-semibold"
                                        th:text="${'R$ ' + #numbers.formatDecimal(order.totalPrice, 1, 'POINT', 2, 'COMMA')}">
                                        -</td>
                                    <td class="text-center">
                                        <form th:action="@{/management/orders/{id}/status(id=${order.id})}"
                                            method="post"
                                            class="d-flex gap-2 justify-content-center align-items-center">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                th:value="${_csrf.token}" />
                                            <select name="status" class="form-select form-select-sm w-auto">
                                                <option th:each="s : ${statuses}" th:value="${s.name()}"
                                                    th:text="${s.name().replace('_',' ')}"
                                                    th:selected="${order.status.name() == s.name()}">STATUS</option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-primary">
                                                <i class="bi bi-check-lg"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
