spring.application.name=api

# Configurações do banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/menufood
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.database=menufood
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
security.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
security.jwt.expiration-ms=900000
security.jwt.refresh-expiration-days=7

# InfinitePay
infinitepay.api.key=${INFINITEPAY_API_KEY}
infinitepay.api.base-url=${INFINITEPAY_API_BASE_URL}

# URLs base (ajuste para produção)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.backend-url=${APP_BACKEND_URL:https://roulette-conflict-jaundice.ngrok-free.dev}

# Configurações do Mercado Pago
# Em produção, defina mercadopago.use-sandbox=false
mercadopago.use-sandbox=${MERCADOPAGO_USE_SANDBOX:true}
# Timeout de pagamento
order.payment-timeout-minutes=15

# Habilita _method=DELETE/PUT em forms HTML
spring.mvc.hiddenmethod.filter.enabled=true

# Cloudinary (armazenamento de imagens)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:exercice-disp}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Upload de arquivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

