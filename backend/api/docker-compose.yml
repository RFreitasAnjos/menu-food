services:
  postgres:
    image: postgres:16-alpine
    container_name: menufood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: menufood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - menufood_pgdata:/var/lib/postgresql/data

volumes:
  menufood_pgdata:
